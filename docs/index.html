<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>ascii art by ldaelo</title>
<style>
  body {
    background: #000;
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 635px;
    margin: 70px 45px 26px;
    background-image:
      url("assets/frame-divider.png"),
      url("assets/frame-left-border.png"),
      url("assets/frame-right-border.png"),
      url("assets/frame-bottom-left-corner.png"),
      url("assets/frame-bottom-right-corner.png");
    background-repeat: 
      no-repeat,
      no-repeat,
      no-repeat,
      no-repeat,
      no-repeat;
    background-position:
      top center,
      center left,
      center right,
      bottom left,
      bottom right;
    background-size:
      auto 44px,
      180px auto,
      180px auto,
      180px auto,
      180px auto;
  }
  .feed h1 {
    text-transform: uppercase;
  }
  .preview {
    border: 2px dotted #ccc;
    position: relative;
  }
  .preview img {
    width: 100%;
  }
  .preview figcaption {
    width: 100%;
    background: #000;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0));
    position: absolute;
    left: 0;
    bottom: 0;
  }
  .preview figcaption h2 {
    padding: 0 8px;
    text-align: center;
  }
</style>
</head>
<body>
<main>
<section class="feed">
<h1>Pinned</h1>
<figure class="preview">
  <img src="assets/previews/Lana Del Rey-Zpmn.jpeg">
  <figcaption>
    <h2>Lana Del Rey</h2>
  </figcaption>
</figure>
</section>
<section class="feed">
<h1>Recent</h1>
<figure class="preview">
  <img src="assets/previews/Lana Del Rey-Zpmn.jpeg">
  <figcaption>
    <h2>Lana Del Rey</h2>
  </figcaption>
</figure>
</section>
</main>
</body>
</html>
